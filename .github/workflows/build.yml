name: Build

on: [push, pull_request, workflow_call]

jobs:
  revision:
    name: Revision check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-numeric: ${{ steps.version.outputs.version-numeric }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Determine revision number
      id: version
      run: |
        git_commit=$(git rev-parse --short HEAD)
        git_current_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)
        git_commit_no=$(git rev-list --count "${git_current_tag}..HEAD" 2>/dev/null)
        PMD_VERSION=${git_current_tag#v}; PMD_VERSION=${PMD_VERSION//-/.}
        PMD_VERSION_NUMERIC=$(echo "${git_current_tag}" | sed 's/^v//;s/[^0-9.].*//')
        if [ "$git_commit_no" -gt 0 ]; then
          PMD_VERSION+="+git$git_commit_no"
        fi
        echo "version=${PMD_VERSION}" >> $GITHUB_OUTPUT
        echo "version-numeric=${PMD_VERSION_NUMERIC}" >> $GITHUB_OUTPUT


  build-linux:
    name: ${{ matrix.display_name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: revision
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Debian 13
            artifact_label: debian13
            version_slug: deb13
            suite: trixie
            components: main
            runner: ubuntu-latest
            arch: amd64
          - display_name: Debian 13
            artifact_label: debian13
            version_slug: deb13
            suite: trixie
            components: main
            runner: ubuntu-24.04-arm
            arch: arm64
          - display_name: Ubuntu 26.04
            artifact_label: ubuntu26.04
            version_slug: ubu26
            suite: resolute
            components: main universe
            runner: ubuntu-latest
            arch: amd64
          - display_name: Ubuntu 26.04
            artifact_label: ubuntu26.04
            version_slug: ubu26
            suite: resolute
            components: main universe
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Create Build Environment
      uses: ximion/debspawn-action/setup@v1.0.1
      with:
        suite: ${{ matrix.suite }}
        components: ${{ matrix.components }}
        packages: >-
          gcc
          g++
          git-core
          dpkg-dev
          devscripts
          debhelper
          libdistro-info-perl
          cmake
          ninja-build
          appstream
          qt6-base-dev
          qt6-svg-dev
          libkf6configwidgets-dev
          libopencv-dev
          libavcodec-dev
          libavformat-dev
          libswscale-dev
          pybind11-dev
          python3-dev
          python3-numpy
        script:
          git config --global --add safe.directory /srv/build

    - name: Build
      uses: ximion/debspawn-action/run@v1.0.1
      with:
        suite: ${{ matrix.suite }}
        summary: "Build PoMiDAQ on ${{ matrix.display_name }} (${{ matrix.arch }})"
        commands: |
          CC=gcc CXX=g++ \
          DEBEMAIL=no-reply@physiologie.uni-heidelberg.de SUITE="${{ matrix.suite }}" DEBVER_SLUG="${{ matrix.version_slug }}" \
            ./contrib/ci/cibuild.sh

    - name: Upload Linux package artifact
      uses: actions/upload-artifact@v7
      with:
        name: pomidaq_${{ needs.revision.outputs.version }}.${{ matrix.artifact_label }}_${{ matrix.arch }}.zip
        path: "*.deb"


  build-windows:
    name: Windows
    runs-on: windows-latest
    needs: revision
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ucrt64
        update: true
        pacboy: >-
          git
          cmake
          ninja
          gcc:p
          python
          librsvg:p
          icoutils:p
          appstream:p
          qt6-base:p
          qt6-svg:p
          opencv:p
          ffmpeg:p
          pybind11:p
          python-numpy:p

    - name: Configure
      run: |
        cmake -GNinja -Bbuild \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/PoMiDAQ-${{ needs.revision.outputs.version }}" \
          -DPython3_EXECUTABLE="$(which python3)" \
          -DGUI=ON \
          -DPYTHON=ON

    - name: Build
      run: cmake --build build

    - name: Install & Bundle
      run: |
        cmake --build build --target install

        cd $GITHUB_WORKSPACE
        DEPLOY_DIR=$GITHUB_WORKSPACE/PoMiDAQ-${{ needs.revision.outputs.version }}

        windeployqt \
          --no-quick-import \
          --no-translations \
          $DEPLOY_DIR/bin/pomidaq.exe

        # Copy DLLs
        ldd $DEPLOY_DIR/bin/pomidaq.exe \
          | awk '/\/ucrt64\/bin/ { print $3 }' \
          | while read -r dll; do
                install -v -p "$dll" $DEPLOY_DIR/bin/
            done

        # Misc
        cp LICENSE $DEPLOY_DIR/LICENSE.txt
        cp contrib/LICENSES.3rd-party $DEPLOY_DIR/LICENSES_3rd-party.txt
        cp README.md $DEPLOY_DIR/
        cp CITATION.cff $DEPLOY_DIR/
        cp NEWS.md $DEPLOY_DIR/

        # Cleanup
        rm -rf $DEPLOY_DIR/cmake

        # move deploy dir into subdirectory
        mkdir -p $GITHUB_WORKSPACE/win64-deploy
        mv $DEPLOY_DIR $GITHUB_WORKSPACE/win64-deploy/

    - name: Build installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
      with:
        path: contrib/win-installer.iss
        options: >-
          /DAppVersion=${{ needs.revision.outputs.version }}
          /DAppVersionNumeric=${{ needs.revision.outputs.version-numeric }}
          /DDeployDir=..\win64-deploy\PoMiDAQ-${{ needs.revision.outputs.version }}

    - name: Upload Windows installer
      uses: actions/upload-artifact@v7
      with:
        name: PoMiDAQ-${{ needs.revision.outputs.version }}_setup_win64
        path: contrib/output/PoMiDAQ-*_Setup_win64.exe

    - name: Upload Windows build as ZIP
      uses: actions/upload-artifact@v7
      with:
        name: PoMiDAQ-${{ needs.revision.outputs.version }}_win64
        path: win64-deploy/
